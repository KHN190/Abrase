name: CI

on:
  push:
    branches: [main, pre-release]
  pull_request:
    branches: [main, pre-release]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo build (workspace)
        run: cargo build --workspace --all-targets

      - name: cargo test (workspace)
        run: cargo test --workspace --no-fail-fast

  release-build:
    name: release build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p abrase-cli
      - name: smoke test
        run: |
          for f in examples/*.abe; do
            echo "→ $f"
            ./target/release/abrase run "$f" > /dev/null || exit 1
          done

  publish-dry-run:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish -p polka-rs   --dry-run --allow-dirty
      - run: cargo publish -p myriad     --dry-run --allow-dirty
      - run: cargo publish -p abrase     --dry-run --allow-dirty
      - run: cargo publish -p abrase-cli --dry-run --allow-dirty
